[versions]
agp = "8.9.1"
kotlin = "2.1.10"
coreKtx = "1.16.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
coroutinesTest = "1.10.1"
roomTesting = "2.6.1"
androidxTestCore = "1.6.1"
mockk = "1.13.10"
lifecycleRuntimeKtx = "2.10.0"
coroutines = "1.10.1"
retrofit = "2.11.0"
okhttp = "4.12.0"
