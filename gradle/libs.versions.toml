webkit = "1.13.0"
room = "2.6.1"
ksp = "2.1.10-1.0.29"
sqlcipher = "4.6.1"
kotlinxSerialization = "1.7.3"
hilt = "2.56"
# QUIC (옵션 B) — Flutter NeoQuicSocket 과 동일한 raw QUIC bidi stream (ALPN "neo", Gateway2:18029/UDP).
